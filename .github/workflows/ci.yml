name: CI

on:
  pull_request:

permissions:
  contents: read

env:
  # Fresh extraction source; tests read it too
  CURRANTUI_REPO: ${{ github.workspace }}/currantui-src

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # If nhic-lab/currantui is private, add a read-scoped token:
      # token: ${{ secrets.CURRANTUI_READ_TOKEN }}
      - uses: actions/checkout@v7
        with:
          repository: nhic-lab/currantui
          path: currantui-src

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck

      - run: pnpm extract

      - run: pnpm build

      - run: pnpm test
