name: Release

# Deploys to npm via OIDC trusted publishing (no stored token).
# Publishes whenever master carries a package.json version that is not on
# the registry yet — bump the version, push (or merge), and it ships.
# One-time setup on npmjs.com: package @nhic/currantui-mcp → Settings →
# Trusted publisher → GitHub Actions → this repo + "release.yml".
on:
  push:
    branches: [master]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  # Fresh extraction source for the bundled catalog; tests read it too
  CURRANTUI_REPO: ${{ github.workspace }}/currantui-src

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # If nhic-lab/currantui is private, add a read-scoped token:
      # token: ${{ secrets.CURRANTUI_READ_TOKEN }}
      - uses: actions/checkout@v7
        with:
          repository: nhic-lab/currantui
          path: currantui-src

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      # Trusted publishing needs npm >= 11.5
      - run: npm install -g npm@latest

      - name: Skip when this version is already on the registry
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if npm view "@nhic/currantui-mcp@$VERSION" version >/dev/null 2>&1; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "v$VERSION is already published — nothing to deploy."
          else
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi

      - if: steps.version.outputs.publish == 'true'
        run: pnpm install --frozen-lockfile

      - if: steps.version.outputs.publish == 'true'
        run: pnpm extract

      - if: steps.version.outputs.publish == 'true'
        run: pnpm build

      - if: steps.version.outputs.publish == 'true'
        run: pnpm test

      - if: steps.version.outputs.publish == 'true'
        run: npm publish --access public
