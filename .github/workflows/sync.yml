name: Sync catalog

# Keeps the bundled catalog tracking the design system with zero manual
# steps, while respecting master's branch protections (PR required, the
# "verify" check, verified signatures):
#
#   drift detected → open a PR with a GitHub-signed commit (via SYNC_TOKEN)
#   → ci.yml's "verify" runs on it → auto-merge squashes it (GitHub-signed)
#   → the merge push triggers release.yml, which publishes to npm.
#
# When the catalog is already current, this instead heals any missed
# publish: master's version missing from the registry gets published here.
#
# One-time setup:
#   - repo secret SYNC_TOKEN: fine-grained PAT (or GitHub App token) for
#     this repo with Contents: read/write and Pull requests: read/write —
#     the default GITHUB_TOKEN cannot be used (PRs it creates never trigger
#     the required "verify" workflow)
#   - repo setting "Allow auto-merge" enabled (else PRs wait for a click)
on:
  schedule:
    - cron: "17 5 * * *" # daily backstop
  workflow_dispatch:
  repository_dispatch:
    types: [currantui-release] # instant sync, pinged by the currantui repo

permissions:
  contents: write
  id-token: write
  pull-requests: write

concurrency:
  group: sync-catalog

env:
  CURRANTUI_REPO: ${{ github.workspace }}/currantui-src

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: master

      # If nhic-lab/currantui is private, add a read-scoped token:
      # token: ${{ secrets.CURRANTUI_READ_TOKEN }}
      - uses: actions/checkout@v7
        with:
          repository: nhic-lab/currantui
          path: currantui-src

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      # Trusted publishing needs npm >= 11.5
      - run: npm install -g npm@latest

      - run: pnpm install --frozen-lockfile

      - run: pnpm extract

      - run: pnpm build

      - run: pnpm test

      - name: Detect drift and bump the version
        id: drift
        run: |
          if git diff --quiet data/catalog.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Catalog already matches the design system."
            exit 0
          fi
          npm version patch --no-git-tag-version
          {
            echo "changed=true"
            echo "currant=$(node -p "require('$CURRANTUI_REPO/packages/currantui/package.json').version")"
            echo "charts=$(node -p "require('$CURRANTUI_REPO/packages/charts/package.json').version" 2>/dev/null || echo none)"
            echo "version=$(node -p "require('./package.json').version")"
          } >> "$GITHUB_OUTPUT"

      - name: Open a signed catalog-refresh PR
        id: pr
        if: steps.drift.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.SYNC_TOKEN }}
          sign-commits: true
          branch: sync/catalog
          delete-branch: true
          add-paths: |
            data/catalog.json
            package.json
          commit-message: |
            chore: refresh catalog for currantui ${{ steps.drift.outputs.currant }} / charts ${{ steps.drift.outputs.charts }}

            Automated sync: re-extracted from the design system's default branch; bumps @nhic/currantui-mcp to ${{ steps.drift.outputs.version }}.
          title: "Catalog refresh — currantui ${{ steps.drift.outputs.currant }}, charts ${{ steps.drift.outputs.charts }}"
          body: |
            Automated catalog sync. Re-extracted from the design system's default branch and bumps `@nhic/currantui-mcp` to **${{ steps.drift.outputs.version }}**.

            Merging publishes automatically (`release.yml` fires on the merge push).

      - name: Enable auto-merge
        if: steps.pr.outputs.pull-request-operation == 'created'
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
        run: |
          gh pr merge --auto --squash "${{ steps.pr.outputs.pull-request-url }}" ||
            echo "Auto-merge unavailable — enable 'Allow auto-merge' in repo settings, or merge the PR manually."

      - name: Heal a missed publish (catalog current, version unpublished)
        if: steps.drift.outputs.changed == 'false'
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view "@nhic/currantui-mcp@$VERSION" version >/dev/null 2>&1; then
            echo "v$VERSION is already published — nothing to deploy."
            exit 0
          fi
          npm publish --access public
